app = "thelaaw-evolution-laaw"
primary_region = "lhr"

[build]
image = "atendai/evolution-api:v1.8.7"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 1

[[vm]]
size = "shared-cpu-1x"
memory = "256mb"

[env]
  PORT = "8080"
  SERVER_URL = "https://thelaaw-evolution-laaw.fly.dev"
  DOCKER_ENV = "true"
  AUTH_GLOBAL_API_KEY = "thelaaw_secret_key"
  DATABASE_ENABLED = "true"
  DATABASE_PROVIDER = "mongodb"
  WEBHOOK_GLOBAL_ENABLED = "true"
  WEBHOOK_GLOBAL_URL = "https://thelaaw-1.onrender.com/webhook/whatsapp"
  WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS = "false"
  WEBHOOK_EVENTS_MESSAGES_UPSERT = "true"
  WEBHOOK_EVENTS_MESSAGES_UPDATE = "true"
  WEBHOOK_EVENTS_SEND_MESSAGE = "true"
  WEBHOOK_EVENTS_CONNECTION_UPDATE = "true"
