app = "thelaaw-evolution-laaw"
primary_region = "iad"

[build]
dockerfile = "Dockerfile.evolution"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 1

[[vm]]
size = "shared-cpu-1x"
memory = "1gb"

[env]
  PORT = "8080"
  SERVER_TYPE = "http"
  SERVER_NAME = "evolution"
  SERVER_URL = "https://thelaaw-evolution-laaw.fly.dev"
  CORS_ORIGIN = "*"
  CORS_METHODS = "GET,POST,PUT,DELETE"
  CORS_CREDENTIALS = "true"
  AUTHENTICATION_TYPE = "apikey"
  AUTHENTICATION_API_KEY = "thelaaw_secret_key"
  AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES = "true"
  DOCKER_ENV = "true"
  DEL_INSTANCE = "false"
  DATABASE_ENABLED = "true"
  DATABASE_PROVIDER = "postgresql"
  DATABASE_CONNECTION_URI = "postgresql://neondb_owner:npg_iOTH5GJyK2jk@ep-cool-water-amyd2tzf.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require"
  DATABASE_URL = "postgresql://neondb_owner:npg_iOTH5GJyK2jk@ep-cool-water-amyd2tzf.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require"
  DATABASE_CONNECTION_CLIENT_NAME = "evolution_v2"
  DATABASE_SAVE_DATA_INSTANCE = "true"
  DATABASE_SAVE_DATA_NEW_MESSAGE = "true"
  DATABASE_SAVE_MESSAGE_UPDATE = "true"
  DATABASE_SAVE_DATA_CONTACTS = "true"
  DATABASE_SAVE_DATA_CHATS = "true"
  DATABASE_SAVE_DATA_LABELS = "true"
  DATABASE_SAVE_DATA_HISTORIC = "true"
  DATABASE_SAVE_IS_ON_WHATSAPP = "true"
  DATABASE_SAVE_IS_ON_WHATSAPP_DAYS = "7"
  DATABASE_DELETE_MESSAGE = "true"
  RABBITMQ_ENABLED = "false"
  WEBSOCKET_ENABLED = "false"
  CHATWOOT_ENABLED = "false"
  WEBHOOK_GLOBAL_ENABLED = "true"
  WEBHOOK_GLOBAL_URL = "https://thelaaw-1.onrender.com/webhook/whatsapp"
  WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS = "false"
  WEBHOOK_EVENTS_MESSAGES_UPSERT = "true"
  WEBHOOK_EVENTS_MESSAGES_UPDATE = "true"
  WEBHOOK_EVENTS_SEND_MESSAGE = "true"
  WEBHOOK_EVENTS_CONNECTION_UPDATE = "true"
  CACHE_REDIS_ENABLED = "false"
  CACHE_LOCAL_ENABLED = "true"
  LOG_LEVEL = "ERROR,WARN,LOG"
